<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: transparent;
  font-family: 'Segoe UI', system-ui, sans-serif;
  overflow: hidden;
  user-select: none;
  padding: 6px;
  width: 200px;
  height: 220px;
}

.menu {
  background: rgba(14, 14, 22, 0.97);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 13px;
  padding: 5px 0;
  box-shadow: 0 8px 40px rgba(0,0,0,0.8), 0 0 0 0.5px rgba(255,255,255,0.05);
  height: 100%;
  overflow: hidden;
}

.ctx-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 12px 6px;
}

#ctx-visual {
  font-size: 22px;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

#ctx-visual img {
  width: 28px; height: 28px;
  object-fit: contain;
  border-radius: 6px;
}

#ctx-name {
  font-size: 12px;
  font-weight: 700;
  color: #eee;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

#ctx-state {
  font-size: 10px;
  color: rgba(180,142,240,0.8);
}

.sep {
  height: 1px;
  background: rgba(255,255,255,0.07);
  margin: 3px 0;
}

.item {
  padding: 7px 13px;
  font-size: 12px;
  color: #bbb;
  cursor: pointer;
  transition: background 0.1s, color 0.08s;
  white-space: nowrap;
}

.item:hover {
  background: rgba(255,255,255,0.08);
  color: #fff;
}

.item.danger { color: rgba(240,96,112,0.85); }
.item.danger:hover {
  background: rgba(240,96,112,0.1);
  color: #f06070;
}
</style>
</head>
<body>
<div class="menu">
  <div class="ctx-header">
    <div id="ctx-visual">🐾</div>
    <div>
      <div id="ctx-name">Mascota</div>
      <div id="ctx-state">caminando</div>
    </div>
  </div>
  <div class="sep"></div>
  <div class="item" id="item-follow">🖱️ Seguir cursor</div>
  <div class="item" id="item-clone">✨ Clonar</div>
  <div class="item" id="item-new">🐾 Nueva mascota</div>
  <div class="sep"></div>
  <div class="item danger" id="item-dismiss">❌ Despedir esta</div>
  <div class="item danger" id="item-dismiss-all">🗑️ Despedir todas</div>
</div>

<script>
let senderId = null;

window.api.onCtxInit(data => {
  senderId = data.senderId;
  if (data.petName)  document.getElementById('ctx-name').textContent  = data.petName;
  if (data.petState) document.getElementById('ctx-state').textContent = data.petState;
  if (data.petEmoji) document.getElementById('ctx-visual').textContent = data.petEmoji;
  if (data.petImg) {
    const img = document.createElement('img');
    img.src = data.petImg;
    const v = document.getElementById('ctx-visual');
    v.innerHTML = '';
    v.appendChild(img);
  }
  if (data.followMode) {
    document.getElementById('item-follow').textContent = '🖱️ Dejar de seguir';
  }
});

function send(cmd) {
  window.api.ctxCmd({ cmd, senderId });
}

document.getElementById('item-follow').onclick     = () => send('follow');
document.getElementById('item-clone').onclick      = () => send('clone');
document.getElementById('item-new').onclick        = () => send('new');
document.getElementById('item-dismiss').onclick    = () => send('dismiss');
document.getElementById('item-dismiss-all').onclick= () => send('dismiss-all');

// Close on click outside (blur handled by main.js)
document.addEventListener('click', e => {
  if (!e.target.closest('.menu')) window.api.closeCtxMenu();
});
</script>
</body>
</html>
